spring.application.name=testcodeQL

# Datasource Configuration (from environment variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Profile Configuration
spring.profiles.active=${SPRING_PROFILE:local}

# Server Port (optional)
server.port=8080

# Optional: You can also store in application.properties but less secure
twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.from.number=${TWILIO_FROM_NUMBER}
twilio.to.number=${TWILIO_TO_NUMBER}